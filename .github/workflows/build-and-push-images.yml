name: Build and Push Images

on:
  push:
    branches:
      - main
    paths:
      - 'apps/api/**'
      - 'apps/dashboard/**'
      - 'apps/email-reciever/**'
      - 'apps/socket/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/build-and-push-images.yml'
  pull_request:
    paths:
      - 'apps/api/**'
      - 'apps/dashboard/**'
      - 'apps/email-reciever/**'
      - 'apps/socket/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/build-and-push-images.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      has_changes: ${{ steps.matrix.outputs.has_changes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
            dashboard:
              - 'apps/dashboard/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
            email_reciever:
              - 'apps/email-reciever/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
            socket:
              - 'apps/socket/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'

      - name: Build matrix
        id: matrix
        uses: actions/github-script@v7
        env:
          API_CHANGED: ${{ steps.changes.outputs.api }}
          DASHBOARD_CHANGED: ${{ steps.changes.outputs.dashboard }}
          EMAIL_RECIEVER_CHANGED: ${{ steps.changes.outputs.email_reciever }}
          SOCKET_CHANGED: ${{ steps.changes.outputs.socket }}
          IMAGE_OWNER: ${{ github.repository_owner }}
        with:
          script: |
            const apps = []
            const owner = process.env.IMAGE_OWNER.toLowerCase()

            if (process.env.API_CHANGED === 'true') {
              apps.push({
                name: 'api',
                image: `ghcr.io/${owner}/volve-api`,
                dockerfile: 'apps/api/Dockerfile'
              })
            }

            if (process.env.DASHBOARD_CHANGED === 'true') {
              apps.push({
                name: 'dashboard',
                image: `ghcr.io/${owner}/volve-dashboard`,
                dockerfile: 'apps/dashboard/Dockerfile'
              })
            }

            if (process.env.EMAIL_RECIEVER_CHANGED === 'true') {
              apps.push({
                name: 'email-reciever',
                image: `ghcr.io/${owner}/volve-email-reciever`,
                dockerfile: 'apps/email-reciever/Dockerfile'
              })
            }

            if (process.env.SOCKET_CHANGED === 'true') {
              apps.push({
                name: 'socket',
                image: `ghcr.io/${owner}/volve-socket`,
                dockerfile: 'apps/socket/Dockerfile'
              })
            }

            core.setOutput('matrix', JSON.stringify(apps))
            core.setOutput('has_changes', apps.length > 0 ? 'true' : 'false')

  build-and-push:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.app.image }}
          tags: |
            type=sha,format=long
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.app.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app.name }}
