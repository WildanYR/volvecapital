upstream vc_api_upstream {
    server 127.0.0.1:5000;
}

upstream vc_socket_upstream {
    server 127.0.0.1:5100;
}

upstream vc_email_reciever_upstream {
    server 127.0.0.1:5200;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name api.volve-capital.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.volve-capital.com;

    ssl_certificate /etc/letsencrypt/live/api.volve-capital.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.volve-capital.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location /socket.io/ {
        proxy_pass http://vc_socket_upstream/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location = /email-forward {
        proxy_pass http://vc_email_reciever_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /email-forward/ {
        proxy_pass http://vc_email_reciever_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass http://vc_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
